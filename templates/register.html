{% extends "base.html" %}
{% block title %}Register — DiaSense AI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Start tracking your diabetes risk with DiaSense AI</p>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="John Doe" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-lg auth-btn">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
