{% extends "base.html" %}
{% block title %}Login — DiaSense AI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your DiaSense AI account</p>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Your password" autocomplete="current-password">
            </div>
            <label class="checkbox-label">
                <input type="checkbox" name="remember">
                <span>Remember me</span>
            </label>
            <button type="submit" class="btn btn-primary btn-lg auth-btn">Sign In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
    </div>
</div>
{% endblock %}
